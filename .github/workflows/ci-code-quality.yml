# The main CI workflow, running only on PRs, checking code-quality and running tests.

name: 'CI PR Code Quality'
on: [pull_request]
jobs:
  code-quality-and-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup

      - name: Cache ESLint
        uses: actions/cache@v4
        with:
          path: .eslintcache
          key: eslint-cache-${{ runner.os }}-${{ hashFiles('eslint.config.mjs', 'package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            eslint-cache-${{ runner.os }}-

      - name: Run ESLint
        run: pnpm lint --max-warnings=0 --cache

      - name: Run Spellcheck
        run: pnpm spellcheck

      - name: Run Prettier
        run: pnpm format:check

      - name: Run TypeScript
        run: pnpm type:check

      - name: Run Tests
        run: pnpm test
